<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Flying Tiger Tools</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --or:#F47920;--or2:#e06810;
  --bg:#080808;--bg2:#101010;--card:#141414;--card2:#1c1c1c;
  --brd:#222;--brd2:#2a2a2a;
  --tx:#f0f0f0;--tx2:#a0a0a0;--tx3:#606060;
  --green:#00c853;--red:#ff1744;--amber:#ffab00;
  --radius:18px;--radiusSm:12px;
}
body{background:var(--bg);color:var(--tx);font-family:'Inter',system-ui,sans-serif;height:100dvh;overflow:hidden;display:flex;justify-content:center}
#app{width:100%;max-width:430px;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}
button{cursor:pointer;font-family:inherit;transition:opacity .15s}
button:active{opacity:.7}
input{font-family:inherit;cursor:text}

/* ── PAGES ── */
.pg{display:none;flex-direction:column;position:absolute;inset:0;background:var(--bg);overflow:hidden}
.pg.on{display:flex}

/* ── FLASH OVERLAY ── */
#fl{position:fixed;inset:0;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
#fl.on{display:flex}
#fl.g{background:linear-gradient(160deg,#011a08 0%,#022010 100%)}
#fl.r{background:linear-gradient(160deg,#1a0105 0%,#200208 100%)}
#fl.w{background:linear-gradient(160deg,#1a1000 0%,#201400 100%)}
.fl-ring{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:20px;flex-shrink:0}
#fl.g .fl-ring{background:rgba(0,200,83,.12);border:1.5px solid rgba(0,200,83,.3)}
#fl.r .fl-ring{background:rgba(255,23,68,.12);border:1.5px solid rgba(255,23,68,.3)}
#fl.w .fl-ring{background:rgba(255,171,0,.12);border:1.5px solid rgba(255,171,0,.3)}
.fl-ref{font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;opacity:.5}
.fl-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;line-height:1.2}
.fl-name{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:24px;font-style:italic}
.fl-prices{display:flex;gap:10px;margin-bottom:24px;width:100%}
.pbox{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 8px;text-align:center}
.plbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;display:block}
.plbl.old{color:rgba(255,100,100,.7)}.plbl.nw{color:rgba(100,255,150,.7)}.plbl.stk{color:rgba(255,171,0,.7)}
.pval{display:block}
.pval.old{color:#ff6464;font-size:13px;font-weight:700;text-decoration:line-through;opacity:.8}
.pval.nw{color:#fff;font-size:32px;font-weight:900;line-height:1}
.pval.stk{font-size:26px;font-weight:900;line-height:1}
.retire-card{background:rgba(255,171,0,.08);border:1px solid rgba(255,171,0,.2);border-radius:14px;padding:18px;margin-bottom:20px;width:100%}
.retire-card h3{color:var(--amber);font-size:16px;font-weight:700;margin-bottom:4px}
.retire-card p{color:rgba(255,171,0,.6);font-size:13px}
.fl-manual-wrap{width:100%;max-width:280px;display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
.fl-manual-wrap input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:13px 16px;color:#fff;font-size:16px;text-align:center;outline:none;width:100%}
.fl-manual-wrap input:focus{border-color:rgba(255,255,255,.35)}
.btn-fl-add{background:var(--green);color:#000;border:none;border-radius:12px;padding:13px;width:100%;font-weight:700;font-size:14px}
.btn-fl-next{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:14px;padding:14px 36px;font-weight:700;font-size:15px;margin-top:4px}
#fl.g .btn-fl-next{background:rgba(0,200,83,.15);border-color:rgba(0,200,83,.3)}
#fl.r .btn-fl-next{background:rgba(255,23,68,.15);border-color:rgba(255,23,68,.3)}
.btn-fl-manual{background:transparent;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5);border-radius:12px;padding:11px 24px;font-size:13px;font-weight:600;margin-top:8px;width:100%;max-width:280px}

/* ── LANGUAGE SCREEN ── */
.lang-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:32px}
.lang-logo{width:64px;height:64px;border-radius:20px;background:var(--or);display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 8px 32px rgba(244,121,32,.35)}
.lang-title{text-align:center}
.lang-title h1{font-size:26px;font-weight:900;letter-spacing:-.5px}
.lang-title p{color:var(--tx2);font-size:14px;margin-top:6px}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:320px}
.lang-btn{background:var(--card);border:1.5px solid var(--brd2);border-radius:var(--radius);padding:18px 12px;display:flex;flex-direction:column;align-items:center;gap:8px}
.lang-btn .flag{font-size:28px}
.lang-btn .lname{font-size:13px;font-weight:600;color:var(--tx2)}
.lang-btn.sel{background:rgba(244,121,32,.1);border-color:var(--or)}
.lang-btn.sel .lname{color:var(--or)}

/* ── STORE SCREEN ── */
.store-screen{flex:1;display:flex;flex-direction:column;overflow:hidden}
.store-top{padding:48px 24px 20px;flex-shrink:0}
.store-top h2{font-size:20px;font-weight:800;margin-bottom:4px}
.store-top p{color:var(--tx2);font-size:13px}
.store-search{padding:0 24px 12px;flex-shrink:0}
.store-search input{width:100%;background:var(--card);border:1.5px solid var(--brd2);border-radius:var(--radiusSm);padding:12px 16px;color:var(--tx);font-size:14px;outline:none}
.store-search input:focus{border-color:var(--or)}
.store-search input::placeholder{color:var(--tx3)}
.store-list{flex:1;overflow-y:auto;padding:0 24px 24px}
.store-item{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--card);border:1.5px solid var(--brd);border-radius:var(--radiusSm);margin-bottom:8px;font-size:15px;font-weight:600;color:var(--tx);width:100%;text-align:left}
.store-item:hover{border-color:var(--brd2)}
.store-item.sel{background:rgba(244,121,32,.08);border-color:var(--or);color:var(--or)}
.store-item-arrow{color:var(--tx3);font-size:18px}

/* ── PIN OVERLAY ── */
.pin-overlay{position:fixed;inset:0;z-index:100;background:rgba(8,8,8,.95);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:20px}
.pin-overlay h3{font-size:18px;font-weight:700}
.pin-overlay p{color:var(--tx2);font-size:13px}
.pin-dots{display:flex;gap:14px;margin:8px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--brd2);transition:background .2s}
.pin-dot.filled{background:var(--or)}
.pin-hidden{position:absolute;opacity:0;width:1px;height:1px}
.pin-err{color:var(--red);font-size:13px;font-weight:600;min-height:18px}
.btn-pin-confirm{background:var(--or);color:#fff;border:none;border-radius:var(--radius);padding:16px 0;width:100%;max-width:280px;font-weight:700;font-size:16px}
.btn-pin-confirm:disabled{background:var(--card2);color:var(--tx3);cursor:not-allowed;opacity:1}
.btn-pin-back{background:transparent;border:none;color:var(--tx2);font-size:14px;font-weight:500}

/* ── TOP BAR ── */
.topbar{padding:52px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left h1{font-size:19px;font-weight:800}
.topbar-left p{color:var(--tx2);font-size:12px;margin-top:2px}
.topbar-right{display:flex;gap:8px}
.tb-btn{width:38px;height:38px;border-radius:50%;background:var(--card);border:1.5px solid var(--brd2);color:var(--tx2);display:flex;align-items:center;justify-content:center;font-size:16px}

/* ── PAGE HEADER ── */
.phdr{padding:52px 20px 16px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.btn-back{width:38px;height:38px;border-radius:50%;background:var(--card);border:1.5px solid var(--brd2);color:var(--tx);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.phdr h2{font-size:18px;font-weight:800;flex:1}
.phdr-badge{background:rgba(244,121,32,.15);color:var(--or);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid rgba(244,121,32,.2)}

/* ── MENU ── */
.menu-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 20px 20px}
.menu-card{position:relative;display:flex;align-items:center;gap:16px;padding:20px 18px;background:var(--card);border:1.5px solid var(--brd);border-radius:var(--radius);margin-bottom:12px;text-align:left;width:100%;overflow:hidden}
.menu-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
.menu-card:hover{border-color:var(--brd2)}
.menu-card:active{border-color:var(--or)}
.menu-icon-wrap{width:52px;height:52px;border-radius:16px;background:rgba(244,121,32,.1);border:1px solid rgba(244,121,32,.15);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.menu-text{flex:1}
.menu-text h3{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:3px}
.menu-text p{font-size:12px;color:var(--tx2);line-height:1.4}
.menu-arrow{color:var(--tx3);font-size:20px;flex-shrink:0}
.help-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);color:rgba(255,255,255,.35);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.help-btn:active{background:rgba(244,121,32,.15);border-color:rgba(244,121,32,.3);color:var(--or)}

/* ── VM HEADER ── */
.vm-bar{padding:52px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg)}
.vm-bar-l{display:flex;align-items:center;gap:10px}
.vm-back{width:34px;height:34px;border-radius:50%;background:var(--card);border:1.5px solid var(--brd2);color:var(--tx);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.vm-info h3{font-size:13px;font-weight:700}
.vm-info p{font-size:11px;color:var(--tx3);margin-top:1px}
.camp-pill{background:rgba(244,121,32,.1);border:1px solid rgba(244,121,32,.2);color:var(--or);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700}
.vm-bar-r{display:flex;gap:6px}
.vm-sm-btn{width:32px;height:32px;border-radius:50%;background:var(--card);border:1.5px solid var(--brd2);color:var(--tx2);display:flex;align-items:center;justify-content:center;font-size:13px}

/* ── CAMERA ── */
.cam-wrap{flex:1;position:relative;overflow:hidden;background:#000}
video{width:100%;height:100%;object-fit:cover;display:block}
.cam-overlay{position:absolute;inset:0;pointer-events:none}
.cam-dim{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.vf-frame{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);width:260px;height:100px}
.vf-shadow{position:absolute;inset:0;box-shadow:0 0 0 9999px rgba(0,0,0,.6)}
.vf-corner{position:absolute;width:24px;height:24px}
.vf-corner.tl{top:0;left:0;border-top:2px solid var(--or);border-left:2px solid var(--or);border-radius:6px 0 0 0}
.vf-corner.tr{top:0;right:0;border-top:2px solid var(--or);border-right:2px solid var(--or);border-radius:0 6px 0 0}
.vf-corner.bl{bottom:0;left:0;border-bottom:2px solid var(--or);border-left:2px solid var(--or);border-radius:0 0 0 6px}
.vf-corner.br{bottom:0;right:0;border-bottom:2px solid var(--or);border-right:2px solid var(--or);border-radius:0 0 6px 0}
.scan-line{position:absolute;left:6px;right:6px;top:50%;height:1.5px;background:linear-gradient(90deg,transparent,var(--or),transparent);animation:sl 2s ease-in-out infinite}
@keyframes sl{0%{top:15%;opacity:0}10%{opacity:1}50%{top:85%}90%{opacity:1}100%{top:15%;opacity:0}}
.cam-hint{position:absolute;bottom:24px;left:0;right:0;text-align:center;color:rgba(255,255,255,.5);font-size:12px;font-weight:500;letter-spacing:.5px}
.cam-err-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,8,8,.95);text-align:center;padding:32px;gap:14px}
.cam-load{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000;color:var(--tx2);font-size:13px;gap:10px}
.ready-badge{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,.9);backdrop-filter:blur(10px);border:1px solid var(--brd2);border-radius:20px;padding:8px 18px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--tx);font-weight:600;z-index:10}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pu 1.5s ease-in-out infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}

/* ── VM RESULT SHEET ── */
.result-sheet{position:absolute;bottom:0;left:0;right:0;z-index:50;background:var(--card);border-top:1px solid var(--brd2);border-radius:24px 24px 0 0;padding:20px;max-height:62%;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--brd2);border-radius:2px;margin:0 auto 18px}
.btn-sheet-close{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:50%;background:var(--card2);border:none;color:var(--tx2);font-size:16px;display:flex;align-items:center;justify-content:center}
.art-chip{background:rgba(244,121,32,.12);color:var(--or);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid rgba(244,121,32,.2)}
.art-name{font-size:14px;font-weight:700;color:var(--tx)}
.art-page{color:var(--tx2);font-size:12px;margin-top:4px}
.vm-page-img{width:100%;border-radius:12px;margin-top:12px;border:1px solid var(--brd);background:var(--bg2);object-fit:contain;max-height:180px}
.notfound-sheet{position:absolute;bottom:0;left:0;right:0;z-index:50;background:var(--card);border-top:1px solid var(--brd2);border-radius:24px 24px 0 0;padding:28px;text-align:center}

/* ── PRIX ── */
.admin-strip{padding:12px 20px;background:rgba(244,121,32,.06);border-bottom:1px solid rgba(244,121,32,.12);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.admin-strip span{font-size:12px;color:var(--or);font-weight:600}
.btn-import-strip{background:var(--or);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:12px;font-weight:700}
.no-file-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:12px}
.no-file-state .big-icon{font-size:48px;opacity:.4}
.no-file-state h3{font-size:16px;font-weight:700;color:var(--tx)}
.no-file-state p{font-size:13px;color:var(--tx2);line-height:1.5}
.file-info-bar{padding:10px 20px;background:var(--card);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;flex-shrink:0}
.file-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.file-info-bar span{font-size:12px;color:var(--tx2);flex:1}

/* ── CREATION ── */
.cr-cam-collapse{height:0;overflow:hidden;transition:height .35s cubic-bezier(.4,0,.2,1);flex-shrink:0;position:relative}
.cr-cam-collapse video{width:100%;height:100%;object-fit:cover;display:block}
.last-scan-bar{margin:10px 16px 0;padding:11px 16px;background:rgba(0,200,83,.06);border:1px solid rgba(0,200,83,.15);border-radius:12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.last-scan-bar span{color:var(--green);font-weight:600;font-size:13px;font-family:monospace}
.last-scan-bar small{color:var(--tx3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.ref-list{flex:1;overflow-y:auto;padding:8px 16px}
.ref-empty{text-align:center;color:var(--tx3);margin-top:48px}
.ref-empty .empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.ref-empty p{font-size:13px}
.ref-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--brd)}
.ref-num{color:var(--tx3);font-size:11px;font-weight:700;width:20px;text-align:right;flex-shrink:0}
.ref-code{color:var(--tx);font-weight:600;font-size:14px;flex:1;font-family:monospace;letter-spacing:.5px}
.btn-ref-del{background:none;border:none;color:var(--tx3);font-size:18px;padding:0 2px;line-height:1}
.btn-ref-del:hover{color:var(--red)}
.actions-bar{padding:14px 16px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--brd)}
.btn-action{border:none;border-radius:var(--radiusSm);padding:14px 0;font-weight:700;font-size:14px;width:100%;letter-spacing:.2px}
.btn-action.primary{background:var(--or);color:#fff}
.btn-action.primary.paused{background:var(--card2);color:var(--tx2);border:1.5px solid var(--brd2)}
.btn-action.success{background:rgba(0,200,83,.08);color:var(--green);border:1px solid rgba(0,200,83,.2)}
.btn-action.info{background:rgba(100,150,255,.08);color:#7ba4ff;border:1px solid rgba(100,150,255,.2)}

/* ── ADMIN ── */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal-sheet{width:100%;max-width:430px;background:var(--card);border-radius:24px 24px 0 0;padding:20px 20px 40px;max-height:88dvh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--brd2);border-radius:2px;margin:0 auto 20px}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-hdr h2{font-size:18px;font-weight:800}
.btn-modal-close{width:32px;height:32px;border-radius:50%;background:var(--card2);border:none;color:var(--tx2);font-size:18px;display:flex;align-items:center;justify-content:center}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx3);margin-bottom:10px}
.camp-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--card2);border-radius:var(--radiusSm);margin-bottom:6px;border:1px solid var(--brd)}
.camp-row-name{font-size:14px;font-weight:600;color:var(--tx);flex:1}
.camp-row-acts{display:flex;gap:6px}
.btn-camp-act{background:transparent;border:1px solid var(--brd2);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600}
.btn-camp-act.up{color:var(--or);border-color:rgba(244,121,32,.3)}
.btn-camp-act.del{color:var(--red);border-color:rgba(255,23,68,.25)}
.chips-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.cat-chip{background:rgba(244,121,32,.08);color:var(--or);border:1px solid rgba(244,121,32,.2);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600}
.new-camp-row{display:flex;gap:8px;margin-top:10px}
.new-camp-row input{flex:1;background:var(--bg2);border:1.5px solid var(--brd2);border-radius:10px;padding:11px 14px;color:var(--tx);font-size:14px;outline:none}
.new-camp-row input:focus{border-color:var(--or)}
.btn-camp-add{background:var(--or);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:16px}
.sect-div{height:1px;background:var(--brd);margin:18px 0}
.err-banner{background:rgba(255,23,68,.08);border:1px solid rgba(255,23,68,.2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px}

/* ── CAMP SELECTOR ── */
.camp-sel-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center}
.camp-sel-sheet{width:100%;max-width:430px;background:var(--card);border-radius:24px 24px 0 0;padding:20px 20px 40px;max-height:65dvh;display:flex;flex-direction:column}
.camp-opt{padding:13px 16px;border-radius:12px;font-size:14px;font-weight:600;color:var(--tx);cursor:pointer;border:1px solid transparent;margin-bottom:4px}
.camp-opt.sel{background:rgba(244,121,32,.08);border-color:rgba(244,121,32,.2);color:var(--or)}
.camp-opt:hover{background:var(--card2)}
.btn-camp-close{background:var(--card2);border:none;color:var(--tx2);border-radius:12px;padding:13px;width:100%;font-size:14px;font-weight:600;margin-top:10px}

/* ── LOGIN ── */
.login-overlay{position:fixed;inset:0;z-index:250;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.login-card{width:100%;max-width:340px;display:flex;flex-direction:column;gap:14px}
.login-logo{width:54px;height:54px;border-radius:16px;background:var(--or);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 6px}
.login-card h2{text-align:center;font-size:20px;font-weight:800}
.login-card .sub{text-align:center;color:var(--tx2);font-size:13px;margin-top:-8px}
.txt-inp{background:var(--card);border:1.5px solid var(--brd2);border-radius:12px;padding:14px 16px;color:var(--tx);font-size:15px;outline:none;width:100%}
.txt-inp:focus{border-color:var(--or)}
.btn-login{background:var(--or);color:#fff;border:none;border-radius:12px;padding:15px;font-weight:700;font-size:15px;width:100%}
.login-err{background:rgba(255,23,68,.08);border:1px solid rgba(255,23,68,.2);border-radius:10px;padding:10px;font-size:13px;color:var(--red);text-align:center}
.btn-login-close{position:absolute;top:16px;right:16px;background:var(--card);border:1.5px solid var(--brd2);color:var(--tx2);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px}

/* ── PROGRESS ── */
.progress-overlay{position:fixed;inset:0;z-index:300;background:rgba(8,8,8,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:40px;text-align:center}
.prog-bar-track{width:100%;max-width:300px;height:4px;background:var(--brd2);border-radius:2px;overflow:hidden}
.prog-bar-fill{height:100%;background:var(--or);border-radius:2px;transition:width .3s ease}

/* ── HELP MODAL ── */
.help-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:32px}
.help-card{background:var(--card);border:1px solid var(--brd2);border-radius:24px;padding:32px 28px;max-width:340px;width:100%;text-align:center}
.help-card .help-emoji{font-size:44px;margin-bottom:16px;display:block}
.help-card h3{font-size:16px;font-weight:800;margin-bottom:12px}
.help-card p{font-size:14px;color:var(--tx2);line-height:1.65;margin-bottom:24px}
.btn-help-ok{background:var(--or);color:#fff;border:none;border-radius:12px;padding:14px 40px;font-weight:700;font-size:15px}

/* ── FULLSCREEN IMG ── */
.fs-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.97);display:flex;align-items:center;justify-content:center;padding:16px}
.fs-overlay img{max-width:100%;max-height:100%;object-fit:contain;border-radius:10px}
</style>
</head>
<body>
<div id="app">

<!-- ══════════════════════════════════════════════════════
     FLASH OVERLAY
══════════════════════════════════════════════════════ -->
<div id="fl">
  <div class="fl-ring" id="fl-ring"></div>
  <div class="fl-ref" id="fl-ref"></div>
  <div class="fl-title" id="fl-title"></div>
  <div class="fl-name" id="fl-name"></div>

<!-- ══════════════════════════════════════════════════════
     PAGE: LANGUAGE
══════════════════════════════════════════════════════ -->
<div id="pg-lang" class="pg on">
  <div class="lang-screen">

    <div class="lang-title">
      <h1>Flying Tiger Tools</h1>
      <p id="lang-sub">Select your language</p>
    </div>
    <div class="lang-grid">
      <button class="lang-btn" data-lang="fr" onclick="setLang('fr')"><span class="flag">🇫🇷</span><span class="lname">Français</span></button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')"><span class="flag">🇬🇧</span><span class="lname">English</span></button>
      <button class="lang-btn" data-lang="de" onclick="setLang('de')"><span class="flag">🇩🇪</span><span class="lname">Deutsch</span></button>

  </div>
</div>

<!-- ══════════════════════════════════════════════════════

    <div class="store-list" id="store-list"></div>
  </div>
</div>

<!-- PIN OVERLAY -->
<div class="pin-overlay" id="pin-overlay" style="display:none">
  <div style="font-size:32px" id="pin-store-icon">🏪</div>
  <h3 id="pin-store-name" style="color:var(--or)"></h3>
  <p id="pin-label"></p>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <input type="tel" maxlength="4" id="pin-inp" oninput="onPinInput()" onkeydown="if(event.key==='Enter')submitPin()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="position:absolute;opacity:0;width:1px;height:1px;top:50%;left:50%"/>
  <p class="pin-err" id="pin-err"></p>
  <button class="btn-pin-confirm" id="btn-pin" disabled onclick="submitPin()" style="margin-top:8px"></button>
  <button class="btn-pin-back" onclick="cancelPin()" id="btn-pin-back" style="margin-top:12px"></button>

<!-- ══════════════════════════════════════════════════════
     PAGE: MENU
══════════════════════════════════════════════════════ -->
<div id="pg-menu" class="pg">
  <div class="topbar">
    <div class="topbar-left">
      <h1>Flying Tiger</h1>
      <p>📍 <span id="store-disp"></span></p>
    </div>
    <div class="topbar-right">
      <button class="tb-btn" id="btn-admin-menu" onclick="openAdminOrLogin()">🔒</button>
      <button class="tb-btn" onclick="doLogout()">↩</button>
    </div>
  </div>
  <div class="menu-body">
    <button class="menu-card" onclick="showPage('pg-vm')">
      <div class="menu-icon-wrap">📦</div>
      <div class="menu-text">
        <h3 data-t="vmScan"></h3>
        <p data-t="vmScanDesc"></p>
      </div>
      <button class="help-btn" onclick="event.stopPropagation();showHelp('vm')">?</button>
      <div class="menu-arrow">›</div>
    </button>
    <button class="menu-card" onclick="showPage('pg-prix')">

        <h3 data-t="changePrix"></h3>
        <p data-t="changePrixDesc"></p>
      </div>
      <button class="help-btn" onclick="event.stopPropagation();showHelp('prix')">?</button>
      <div class="menu-arrow">›</div>
    </button>
    <button class="menu-card" onclick="showPage('pg-creation')">
      <div class="menu-icon-wrap">🖨️</div>
      <div class="menu-text">
        <h3 data-t="creationPrix"></h3>
        <p data-t="creationPrixDesc"></p>

<!-- ══════════════════════════════════════════════════════
     PAGE: VM SCAN
══════════════════════════════════════════════════════ -->
<div id="pg-vm" class="pg">
  <div class="vm-bar">
    <div class="vm-bar-l">
      <button class="vm-back" onclick="backFromVM()">←</button>
      <div class="vm-info">
        <h3>VM Scanner</h3>
        <p id="vm-art-count"></p>
      </div>
      <button class="camp-pill" id="btn-camp" onclick="openCampSel()">VM ▾</button>
    </div>
    <div class="vm-bar-r">
      <button class="vm-sm-btn" id="btn-vm-admin" onclick="openAdminOrLogin()" style="display:none">⚙️</button>
      <button class="vm-sm-btn" id="btn-vm-lock" onclick="openAdminOrLogin()">🔒</button>
    </div>
  </div>
  <div class="cam-wrap" id="vm-cam">
    <video id="vm-vid" playsinline muted autoplay></video>
    <div class="cam-overlay">
      <div class="cam-dim"></div>
      <div class="vf-frame">
        <div class="vf-shadow"></div>
        <div class="vf-corner tl"></div><div class="vf-corner tr"></div>
        <div class="vf-corner bl"></div><div class="vf-corner br"></div>
        <div class="scan-line"></div>
      </div>
      <div class="cam-hint" id="vm-hint"></div>

    <div class="cam-err-overlay" id="vm-err" style="display:none">
      <div style="font-size:40px">📷</div>
      <p style="font-weight:600;color:var(--tx)" id="vm-err-msg"></p>
      <button onclick="startVM()" style="background:var(--or);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-weight:700" id="vm-retry-btn"></button>
    </div>
    <div class="cam-load" id="vm-load"><div class="pulse"></div><span id="vm-load-txt"></span></div>
    <div class="ready-badge" id="vm-ready" style="display:none"><div class="pulse"></div><span id="vm-ready-txt"></span></div>

      <div class="sheet-handle"></div>
      <button class="btn-sheet-close" onclick="closeVMSheet()">×</button>
      <div id="vm-sheet-content"></div>
      <p style="color:var(--tx2);font-size:11px;text-align:center;margin-top:14px;letter-spacing:.3px" id="vm-remove-card"></p>
    </div>
    <div class="notfound-sheet" id="vm-notfound" style="display:none">
      <div class="sheet-handle"></div>
      <div style="font-size:32px;margin-bottom:10px">❓</div>
      <p style="font-weight:700;font-size:15px" id="vm-unknown-txt"></p>
      <p style="color:var(--tx3);font-size:12px;font-family:monospace;margin-top:6px" id="vm-notfound-code"></p>
      <button onclick="closeVMSheet()" style="margin-top:16px;background:none;border:none;color:var(--or);font-size:13px;font-weight:600" id="vm-close-btn"></button>
    </div>
  </div>
</div>

     PAGE: CHANGEMENT DE PRIX

  <div id="retire-info" style="display:none;padding:8px 20px;font-size:11px;color:var(--amber);font-weight:600;flex-shrink:0;border-bottom:1px solid var(--brd)"></div>

      </div>
    </div>
  </div>
</div>

══════════════════════════════════════════════════════ -->
<div id="pg-creation" class="pg">

    <span class="phdr-badge" id="cr-count" style="display:none"></span>
  </div>

    <div id="admin-permanents"></div>
    <div class="chips-row" id="admin-miss-perms"></div>

    <div class="section-label" data-t="campVMLbl"></div>

</div>

async function sb(path,opts={}){
  const h={'apikey':SB_KEY,'Authorization':'Bearer '+(AUTH_TOKEN||SB_KEY),'Content-Type':'application/json',...opts.headers};
  const r=await fetch(SB_URL+path,{...opts,headers:h});
  if(!r.ok){let e;try{e=await r.json();}catch{e={message:r.statusText};}throw new Error(e.message||r.statusText);}
  if(r.status===204||opts.noJson)return null;
  return r.json();
}
async function sbStorage(bucket,path,blob){
  const h={'apikey':SB_KEY,'Authorization':'Bearer '+(AUTH_TOKEN||SB_KEY),'x-upsert':'true'};
  const r=await fetch(`${SB_URL}/storage/v1/object/${bucket}/${path}`,{method:'POST',headers:h,body:blob});
  if(!r.ok)throw new Error('Upload failed');
  return r.json().catch(()=>null);
}
function storageUrl(b,p){return`${SB_URL}/storage/v1/object/public/${b}/${p}`;}

async function checkAuth(){
  if(!AUTH_TOKEN)return;
  try{
    const d=await sb('/auth/v1/user',{headers:{'Authorization':'Bearer '+AUTH_TOKEN}});
    if(d?.id){const a=await sb('/rest/v1/rpc/has_role',{method:'POST',body:JSON.stringify({_user_id:d.id,_role:'admin'})}).catch(()=>false);IS_ADMIN=!!a;updateAdminUI();}
  }catch{AUTH_TOKEN='';localStorage.removeItem('ft_auth_token');}
}
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pwd=document.getElementById('login-pwd').value;
  const errEl=document.getElementById('login-err');errEl.style.display='none';
  try{
    const d=await fetch(`${SB_URL}/auth/v1/token?grant_type=password`,{method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({email,password:pwd})}).then(r=>r.json());
    if(d.error||!d.access_token)throw new Error(d.error_description||'Error');
    AUTH_TOKEN=d.access_token;localStorage.setItem('ft_auth_token',AUTH_TOKEN);
    const a=await sb('/rest/v1/rpc/has_role',{method:'POST',body:JSON.stringify({_user_id:d.user.id,_role:'admin'})}).catch(()=>false);
    IS_ADMIN=!!a;
    if(!IS_ADMIN){errEl.textContent=t('noAdmin');errEl.style.display='block';}
    else{closeLogin();updateAdminUI();openAdmin();}
  }catch(e){errEl.textContent=e.message;errEl.style.display='block';}
}

async function startVM(){

  document.getElementById('vm-load').style.display='flex';
  document.getElementById('vm-ready').style.display='none';
  stopScan('vm');

  vmStream=await startCam(vid,msg=>{document.getElementById('vm-err-msg').textContent=msg;document.getElementById('vm-err').style.display='flex';document.getElementById('vm-load').style.display='none';});
  if(!vmStream)return;
  document.getElementById('vm-load').style.display='none';
  document.getElementById('vm-ready').style.display='flex';
  vmScanPaused=false;
  scanLoop(vid,code=>handleVMScan(code),'vm');
}
async function lookupArticle(campId,barcode){
  const clean=barcode.replace(/\D/g,'');if(!clean)return null;
  const exact=await sb(`/rest/v1/vm_articles?campaign_id=eq.${campId}&code=eq.${clean}&select=code,name,vm_page,location&limit=1`).catch(()=>[]);
  if(exact?.length)return exact[0];
  const all=await sb(`/rest/v1/vm_articles?campaign_id=eq.${campId}&select=code,name,vm_page,location`).catch(()=>[]);
  if(!all)return null;
  for(const a of all){if(clean.includes(a.code)||a.code.includes(clean))return a;}
  const short=clean.slice(-7);
  for(const a of all){if(a.code.endsWith(short)||short.endsWith(a.code))return a;}
  return null;
}
async function handleVMScan(raw){
  if(vmScanPaused)return;
  const all=[];
  const sorted=[...campaigns].sort((a,b)=>a.id===activeCampaign?.id?-1:1);
  await Promise.all(sorted.map(async c=>{const f=await lookupArticle(c.id,raw);if(f)all.push({...f,campId:c.id,campName:c.name});}));
  if(all.length){all.sort((a,b)=>a.campId===activeCampaign?.id?-1:1);showVMResult(all,raw);}
  else showVMNotFound(raw);
}
function showVMResult(matches,raw){
  vmScanPaused=true;clearTimeout(vmAutoTimer);
  const m=matches[0];
  const pn=(m.vm_page||'').match(/(\d+)/)?.[1];

  let html=matches.map((x,i)=>`
    <div style="${i>0?'margin-top:14px;padding-top:14px;border-top:1px solid var(--brd)':''}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span class="art-chip">${x.code}</span>
        <span class="art-name">${x.name||''}</span>
      </div>
      <div class="art-page">📄 ${x.vm_page||''} &nbsp;·&nbsp; ${x.campName}</div>
    </div>`).join('');
  if(img)html+=`<img class="vm-page-img" src="${img}" onclick="document.getElementById('fs-img').src=this.src;document.getElementById('fs').style.display='flex'" onerror="this.style.display='none'"/>`;
  document.getElementById('vm-sheet-content').innerHTML=html;
  document.getElementById('vm-sheet').style.display='block';
  document.getElementById('vm-notfound').style.display='none';
  vmAutoTimer=setTimeout(()=>closeVMSheet(),8000);
}
function showVMNotFound(raw){
  vmScanPaused=true;clearTimeout(vmAutoTimer);
  document.getElementById('vm-notfound-code').textContent=raw;

async function loadPrixFromSupabase(){
  try{
    const url=storageUrl('prix-data','treasure-day.json');
    const r=await fetch(url+'?t='+Date.now());
    if(!r.ok) return;
    const data=await r.json();
    if(!data||!data.articles) return;
    priceData=data.articles;
    retireData=new Set(data.retire||[]);
    prixLoaded=true;
    document.getElementById('prix-fname').textContent=`Treasure Day — ${Object.keys(priceData).length} articles`;
    if(retireData.size>0){
      const ri=document.getElementById('retire-info');
      ri.style.display='block';ri.textContent=`⚠️ ${retireData.size} ${t('retireDetected')}`;
    }
    document.getElementById('prix-no-file').style.display='none';
    const sw=document.getElementById('prix-scan-wrap');sw.style.display='flex';sw.style.flexDirection='column';
    startPrix();
  }catch(e){console.log('No prix data in Supabase yet');}
}

async function savePrixToSupabase(){
  try{
    const payload=JSON.stringify({
      articles:priceData,
      retire:Array.from(retireData),
      updatedAt:new Date().toISOString()
    });
    const blob=new Blob([payload],{type:'application/json'});
    // Create bucket if needed
    await sb('/rest/v1/rpc/create_prix_bucket',{method:'POST',body:'{}'}).catch(()=>{});
    // Upload to storage
    const h={'apikey':SB_KEY,'Authorization':'Bearer '+(AUTH_TOKEN||SB_KEY),'x-upsert':'true','Content-Type':'application/json'};
    await fetch(`${SB_URL}/storage/v1/object/prix-data/treasure-day.json`,{method:'POST',headers:h,body:blob});
    console.log('Prix data saved to Supabase');
  }catch(e){console.error('Save prix error',e);}
}
function loadPrixFile(inp){
  const file=inp.files[0];if(!file)return;inp.value='';
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:false,cellNF:false,cellStyles:false,sheetStubs:false});
      priceData={};retireData=new Set();
      const mainSheet=wb.SheetNames.find(n=>n.toLowerCase().includes('included'))||wb.SheetNames[0];
      const ws=wb.Sheets[mainSheet];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',blankrows:false});
      let hdrIdx=0;
      for(let i=0;i<Math.min(6,rows.length);i++){if(rows[i]&&rows[i].some(c=>String(c||'').toLowerCase().includes('item number'))){hdrIdx=i;break;}}
      const hdr=(rows[hdrIdx]||[]).map(h=>String(h||'').toLowerCase());
      const rc=findCol(hdr,['item number','ref','code','ean']);
      const oc=findCol(hdr,['current price','ancien','old','avant']);
      const nc=findCol(hdr,['new price','nouveau','new','après','apres']);
      const nameC=findCol(hdr,['item name','name','nom']);
      // SOH by store
      let sohByItem={};
      const sohSheet=wb.SheetNames.find(n=>n.toLowerCase().includes('soh'));
      if(sohSheet){
        const sw2=wb.Sheets[sohSheet];
        const sr=XLSX.utils.sheet_to_json(sw2,{header:1,defval:'',blankrows:false});
        const storeRow=sr.find(r=>r&&r.some(c=>String(c||'').toUpperCase().startsWith('CH0')));
        if(storeRow){
          const si=storeRow.map(c=>String(c||'').toUpperCase()).indexOf(currentStore.toUpperCase());
          if(si>=0)sr.slice(2).forEach(row=>{const ref=String(row[0]||'').replace(/\D/g,'');if(ref.length>=5)sohByItem[ref]=Number(row[si])||0;});
        }
      }
      rows.slice(hdrIdx+1).forEach(row=>{
        const ref=String(row[rc>=0?rc:0]||'').replace(/\D/g,'').trim();
        if(!ref||ref.length<5)return;
        priceData[ref]={old:oc>=0?row[oc]:null,nw:nc>=0?row[nc]:null,name:nameC>=0?row[nameC]:'',soh:sohByItem[ref]??null};
      });
      const exSheet=wb.SheetNames.find(n=>n.toLowerCase().includes('excluded'));
      if(exSheet){
        const exWs=wb.Sheets[exSheet];
        const exRows=XLSX.utils.sheet_to_json(exWs,{header:1,defval:'',blankrows:false});
        const exHdr=(exRows[0]||[]).map(h=>String(h||'').toLowerCase());
        const exRc=findCol(exHdr,['item number','ref','code','ean']);
        exRows.slice(1).forEach(row=>{const ref=String(row[exRc>=0?exRc:0]||'').replace(/\D/g,'').trim();if(ref.length>=5)retireData.add(ref);});
        const ri=document.getElementById('retire-info');
        ri.style.display='block';ri.textContent=`⚠️ ${retireData.size} ${t('retireDetected')}`;
      }
      prixLoaded=true;
      document.getElementById('prix-fname').textContent=`${file.name} — ${Object.keys(priceData).length} articles`;
      document.getElementById('prix-no-file').style.display='none';
      const sw3=document.getElementById('prix-scan-wrap');sw3.style.display='flex';sw3.style.flexDirection='column';
      // Sauvegarde dans Supabase pour tous les utilisateurs
      if(IS_ADMIN) await savePrixToSupabase();
      startPrix();
    }catch(err){alert(t('errRead')+err.message);}
  };
  reader.onerror=()=>alert('Erreur lecture fichier');
  reader.readAsArrayBuffer(file);
}
async function startPrix(){
  document.getElementById('prix-err').style.display='none';stopScan('prix');
  const vid=document.getElementById('prix-vid');
  prixStream=await startCam(vid,msg=>{document.getElementById('prix-err-msg').textContent=msg;document.getElementById('prix-err').style.display='flex';});
  if(!prixStream)return;
  scanLoop(vid,code=>handlePrixScan(code),'prix');
}
function handlePrixScan(raw){
  const ref=extractRef(raw);if(!ref)return;
  if(retireData.size>0&&retireData.has(ref)){showFlashRetire(ref);return;}
  // Cherche dans priceData : correspondance exacte ou inclusion
  const found=Object.entries(priceData).find(([k])=>{
    const kr=k.replace(/\D/g,'');
    const rr=ref.replace(/\D/g,'');
    return kr===rr||kr.endsWith(rr.slice(1))||rr.endsWith(kr.slice(1));
  });
  if(found)showFlashPrix(ref,found[1].old,found[1].nw,found[1].name,found[1].soh);
  else showFlashRed(t('notFound'),t('checkManual'),'prix');
}

async function handleImportPDF(inp){
  const file=inp.files[0];if(!file||!importTargetCampId)return;inp.value='';showProgress('PDF...');
  try{
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    const total=pdf.numPages;
    for(let i=1;i<=total;i++){
      setProgress(Math.round(100*i/total),`${i}/${total}`);
      const page=await pdf.getPage(i);
      const vp=page.getViewport({scale:2});
      const canvas=document.createElement('canvas');
      canvas.width=vp.width;canvas.height=vp.height;
      await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
      const blob=await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.85));
      canvas.remove();
      await sbStorage('vm-pages',`${importTargetCampId}/page-${i}.jpg`,blob);
      await sb('/rest/v1/vm_pages',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({campaign_id:importTargetCampId,page_number:i,image_path:`${importTargetCampId}/page-${i}.jpg`})});

    hideProgress();alert(`✅ ${total} ${t('pagesDone')}`);
  }catch(e){hideProgress();alert(t('errRead')+e.message);}
}

async function startCam(videoEl,onError){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    videoEl.srcObject=stream;await videoEl.play();return stream;
  }catch(e){onError(e.name==='NotAllowedError'?t('camAllow'):t('camError'));return null;}
}
function stopScan(w){
  if(w==='vm'&&vmStream){vmStream.getTracks().forEach(t=>t.stop());vmStream=null;if(vmRaf){cancelAnimationFrame(vmRaf);vmRaf=null;}}
  if(w==='prix'&&prixStream){prixStream.getTracks().forEach(t=>t.stop());prixStream=null;if(prixRaf){cancelAnimationFrame(prixRaf);prixRaf=null;}}
  if(w==='cr'&&crStream){crStream.getTracks().forEach(t=>t.stop());crStream=null;if(crRaf){cancelAnimationFrame(crRaf);crRaf=null;}}
}
function scanLoop(videoEl,onCode,which){
  if(!('BarcodeDetector' in window)){alert('BarcodeDetector not supported. Use Chrome Android or Safari 17+.');return;}
  const det=new BarcodeDetector({formats:['ean_13','ean_8','code_128','code_39','upc_a','upc_e','itf']});
  let active=true,lastCode='',lastTime=0;
  const setR=id=>{if(which==='vm')vmRaf=id;else if(which==='prix')prixRaf=id;else crRaf=id;};
  const loop=async()=>{
    if(!active||videoEl.readyState<2){if(active)setR(requestAnimationFrame(loop));return;}
    try{
      const codes=await det.detect(videoEl);
      if(codes.length){const raw=codes[0].rawValue,now=Date.now();if(raw!==lastCode||now-lastTime>2000){lastCode=raw;lastTime=now;onCode(raw);}}
    }catch{}
    if(active)setR(requestAnimationFrame(loop));
  };
  setR(requestAnimationFrame(loop));
}

function showProgress(msg){document.getElementById('prog').style.display='flex';document.getElementById('prog-msg').textContent=msg;document.getElementById('prog-bar').style.width='0%';document.getElementById('prog-sub').textContent='';}
function setProgress(pct,sub){document.getElementById('prog-bar').style.width=pct+'%';document.getElementById('prog-sub').textContent=sub;}
function hideProgress(){document.getElementById('prog').style.display='none';}

// NAVIGATION
// ══════════════════════════════════════════════════════
function showPage(id){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  if(id==='pg-vm'){loadCampaigns().then(()=>startVM());}
  if(id==='pg-prix'){initPrixPage();}
  if(id==='pg-store'){renderStores();}
}
function backFrom(pgId){
  if(pgId==='pg-prix')stopScan('prix');
  if(pgId==='pg-creation'){stopScan('cr');crScanning=false;document.getElementById('cr-cam-wrap').style.height='0';document.getElementById('btn-cr-scan').textContent=t('launch');document.getElementById('btn-cr-scan').classList.remove('paused');}
  showPage('pg-menu');
}

function extractRef(code){
  const clean=code.replace(/\D/g,'');
  // Flying Tiger EAN-13: 0200030XXXXXXY où XXXXXX = 6 derniers chiffres de la ref (sans le 3 initial)
  // Ex: ref=3050263, EAN=0200030502639 → slice(6,13)='0502639' → ref='30'+slice(6,12)='3050263'
  if(clean.startsWith('020003')&&clean.length>=13){
    const part=clean.slice(6,12); // 6 chiffres
    return '30'+part; // reconstruit la ref 7 chiffres ex: 3050263
  }
  // Fallback 7 chiffres
  const m=clean.match(/3\d{6}/);
  return m?m[0]:null;
}
function findCol(hdr,keys){for(const k of keys){const i=hdr.findIndex(h=>h.includes(k));if(i>=0)return i;}return -1;}
function parseCSV(text){
  const lines=text.trim().split('\n');if(lines.length<2)throw new Error('Empty CSV');
  const hdrs=lines[0].split(/[,;\t]/).map(h=>h.trim().toLowerCase());
  const ci=hdrs.findIndex(h=>h.includes('code')||h.includes('article')||h.includes('ref')||h.includes('ean'));
  const ni=hdrs.findIndex(h=>h.includes('name')||h.includes('nom'));
  const pi=hdrs.findIndex(h=>h.includes('page')||h.includes('vm'));
  const data={};
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(/[,;\t]/).map(c=>c.trim());
    const code=cols[ci]?.replace(/\D/g,'');if(!code)continue;
    data[code]={name:ni>=0?cols[ni]:'',vm_page:cols[pi]||''};
  }
  return data;
}
